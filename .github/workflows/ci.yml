name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: intenttext-builder/package-lock.json

      - name: Install deps
        working-directory: intenttext-builder
        run: npm ci

      - name: Install PDF runtime deps
        working-directory: intenttext-builder
        run: npm --prefix packages/pdf-runtime ci

      - name: Build
        working-directory: intenttext-builder
        run: npm run build

      - name: Build PDF runtime
        working-directory: intenttext-builder
        run: npm run pdf-runtime:build

      - name: PDF runtime tests
        working-directory: intenttext-builder
        run: npm --prefix packages/pdf-runtime test

      - name: Golden parity check
        working-directory: intenttext-builder
        run: npm run parity:check

      - name: Font policy check
        working-directory: intenttext-builder
        run: npm run font-policy:check

      - name: Determinism check
        working-directory: intenttext-builder
        run: npm run determinism:check

      - name: PDF smoke check
        working-directory: intenttext-builder
        env:
          PDF_SMOKE_WRITE: "1"
          PDF_SMOKE_ARTIFACT_DIR: artifacts/pdf-smoke
        run: npm run pdf:smoke

      - name: Upload PDF smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-smoke-artifact
          path: intenttext-builder/artifacts/pdf-smoke/pdf-smoke.pdf
          if-no-files-found: warn
